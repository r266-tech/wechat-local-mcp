name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - name: Build wechat-cli (macOS)
        if: runner.os == 'macOS'
        run: go build -trimpath -o wechat-cli ./cmd/wx-mcp
      - name: Build wechat-cli (Windows)
        if: runner.os == 'Windows'
        run: go build -trimpath -o wechat-cli.exe ./cmd/wx-mcp
      - name: Parse PowerShell installers
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($script in @(".\install.ps1", ".\scripts\package-windows.ps1", ".\scripts\build-windows-wcdb.ps1")) {
            $errors = $null
            [void][System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw -LiteralPath $script), [ref]$errors)
            if ($errors -and $errors.Count -gt 0) {
              $errors | Format-List *
              exit 1
            }
          }
      - name: Windows installer doctor smoke
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $result = .\install.ps1 -Doctor -Json | ConvertFrom-Json
          if ($result.platform -ne "windows" -or $result.mode -ne "doctor") {
            $result | ConvertTo-Json -Depth 8
            exit 1
          }
      - name: Windows installer dry-run smoke
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-Content -LiteralPath .\libWCDB.dll -Value "" -NoNewline
          try {
            $result = .\install.ps1 -DryRun -All -Json | ConvertFrom-Json
            if ($result.platform -ne "windows" -or $result.status -ne "dry_run" -or -not $result.dry_run) {
              $result | ConvertTo-Json -Depth 8
              exit 1
            }
          } finally {
            Remove-Item -LiteralPath .\libWCDB.dll -Force -ErrorAction SilentlyContinue
          }
