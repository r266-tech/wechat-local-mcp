name: Windows Release Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "wx-mcp release version without leading v"
        required: true
        default: "1.5.0"
      wcdb_version:
        description: "Tencent/WCDB release version without leading v"
        required: true
        default: "2.1.16"

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build WCDB DLL
        shell: powershell
        run: |
          .\scripts\build-windows-wcdb.ps1 -WcdbVersion "${{ inputs.wcdb_version }}" -OutDir .\lib

      - name: Package wx-mcp for Windows
        shell: powershell
        run: |
          .\scripts\package-windows.ps1 -Version "${{ inputs.version }}" -WcdbLib .\lib\libWCDB.dll

      - name: Smoke installer from release zip
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ inputs.version }}"
          $zip = ".\dist\wx-mcp-v$version-windows-amd64.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "wx-mcp-package-smoke"
          if (Test-Path $extractRoot) {
            Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }
          Expand-Archive -LiteralPath $zip -DestinationPath $extractRoot -Force
          $pkg = Join-Path $extractRoot "wx-mcp-v$version-windows-amd64"
          $result = & (Join-Path $pkg "install.ps1") -DryRun -All -Json | ConvertFrom-Json
          if ($result.platform -ne "windows" -or $result.status -ne "dry_run" -or -not $result.dry_run) {
            $result | ConvertTo-Json -Depth 8
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: wx-mcp-windows-amd64-${{ inputs.version }}
          path: |
            dist/wx-mcp-v${{ inputs.version }}-windows-amd64.zip
            dist/wx-mcp-v${{ inputs.version }}-windows-amd64.zip.sha256
            dist/wx-mcp-latest-windows-amd64.zip
            dist/wx-mcp-latest-windows-amd64.zip.sha256
          if-no-files-found: error
